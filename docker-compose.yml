version: "3.9"
services:
    app:
        build:
            context: .
            dockerfile: src/MarketNest.Web/Dockerfile
        ports: ["5000:8080"]
        environment:
            - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
            - ConnectionStrings__DefaultConnection=${CONNECTION_STRINGS__DEFAULTCONNECTION}
            - Redis__ConnectionString=${REDIS_CONNECTION_STRING}
            - Jwt__Secret=${JWT_SECRET}
            - Jwt__Issuer=${JWT_ISSUER}
            - Jwt__Audience=${JWT_AUDIENCE}
            - Jwt__AccessTokenExpirationMinutes=${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES}
            - Jwt__RefreshTokenExpirationDays=${JWT_REFRESH_TOKEN_EXPIRATION_DAYS}
            - Seq__ServerUrl=${SEQ_SERVER_URL}
            - Smtp__Host=${SMTP_HOST}
            - Smtp__Port=${SMTP_PORT}
            - RabbitMq__ConnectionString=${RABBITMQ_CONNECTION_STRING}
        depends_on:
            postgres: { condition: service_healthy }
            redis: { condition: service_started }
        volumes:
            - ./src:/app/src

    postgres:
        image: postgres:16-alpine
        environment:
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        ports: ["5432:5432"]
        volumes:
            - pg_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
            interval: 5s
            retries: 5

    redis:
        image: redis:7-alpine
        command: redis-server --appendonly yes
        ports: ["6379:6379"]
        volumes:
            - redis_data:/data

    rabbitmq:
        image: rabbitmq:3-management-alpine
        ports:
            - "5672:5672"
            - "15672:15672"
        environment:
            RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
            RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}

    mailhog:
        image: mailhog/mailhog
        ports:
            - "1025:1025"
            - "8025:8025"

    seq:
        image: datalust/seq:latest
        ports: ["5341:80"]
        environment:
            ACCEPT_EULA: Y
        volumes:
            - seq_data:/data

volumes:
    pg_data:
    redis_data:
    seq_data:
