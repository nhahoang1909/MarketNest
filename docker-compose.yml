version: "3.9"
services:
    app:
        build: .
        ports: ["5000:8080"]
        environment:
            - ASPNETCORE_ENVIRONMENT=Development
            - ConnectionStrings__Default=Host=postgres;Database=marketnest;Username=mn;Password=mn_secret
            - Redis__ConnectionString=redis:6379
        depends_on:
            postgres: { condition: service_healthy }
            redis: { condition: service_started }
        volumes:
            - ./src:/app/src

    postgres:
        image: postgres:16-alpine
        environment:
            POSTGRES_DB: marketnest
            POSTGRES_USER: mn
            POSTGRES_PASSWORD: mn_secret
        ports: ["5432:5432"]
        volumes:
            - pg_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD", "pg_isready", "-U", "mn"]
            interval: 5s
            retries: 5

    redis:
        image: redis:7-alpine
        command: redis-server --appendonly yes
        ports: ["6379:6379"]
        volumes:
            - redis_data:/data

    rabbitmq:
        image: rabbitmq:3-management-alpine
        ports:
            - "5672:5672"
            - "15672:15672"
        environment:
            RABBITMQ_DEFAULT_USER: mn
            RABBITMQ_DEFAULT_PASS: mn_secret

    mailhog:
        image: mailhog/mailhog
        ports:
            - "1025:1025"
            - "8025:8025"

    seq:
        image: datalust/seq:latest
        ports: ["5341:80"]
        environment:
            ACCEPT_EULA: Y
        volumes:
            - seq_data:/data

volumes:
    pg_data:
    redis_data:
    seq_data:
