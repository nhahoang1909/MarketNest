# Production overrides — extends docker-compose.yml
services:
    app:
        image: ghcr.io/youruser/marketnest:${TAG:-latest}
        restart: unless-stopped
        environment:
            - ASPNETCORE_ENVIRONMENT=Production
        deploy:
            resources:
                limits: { memory: 512M }
        volumes: []

    nginx:
        image: nginx:alpine
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
            - ./infra/nginx/certs:/etc/nginx/certs:ro
            - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
        depends_on: [app]
        restart: unless-stopped

    postgres:
        ports: []

    redis:
        ports: []

    rabbitmq:
        ports: []

    mailhog:
        profiles: ["never"]

    seq:
        ports: []
