          restore-keys: ${{ runner.os }}-nuget-
      - name: Restore test project
        run: dotnet restore tests/MarketNest.Analyzers.Tests
      - name: Run Analyzer Tests
        run: |
          dotnet test tests/MarketNest.Analyzers.Tests \
            --no-restore \
            -c ${{ env.CONFIGURATION }} \
            --logger "trx;LogFileName=analyzers.trx" \
            --results-directory ./test-results
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-analyzers
          path: ./test-results/*.trx

  test-integration:
    name: "🧪 Integration Tests"
    needs: build-web
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: marketnest_test
          POSTGRES_USER: mn
          POSTGRES_PASSWORD: mn_secret
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - uses: actions/cache/restore@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: ${{ runner.os }}-nuget-
      - name: Restore test project
        run: dotnet restore tests/MarketNest.IntegrationTests
      - name: Run Integration Tests
        run: |
          dotnet test tests/MarketNest.IntegrationTests \
            --no-restore \
            -c ${{ env.CONFIGURATION }} \
            --logger "trx;LogFileName=integration.trx" \
            --results-directory ./test-results
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=marketnest_test;Username=mn;Password=mn_secret"
          ConnectionStrings__ReadConnection: ""
          Redis__ConnectionString: "localhost:6379"
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-integration
          path: ./test-results/*.trx

  # ┌──────────────────────────────────────────────────────────────────────────┐
  # │  STAGE 4 — VERIFY GATE                                                    │
  # │  Single aggregation job — set branch protection to require only this job.  │
  # └──────────────────────────────────────────────────────────────────────────┘
  verify:
    name: "✅ All checks passed"
    needs:
      - test-unit-base-core
      - test-unit-identity
      - test-unit-catalog
      - test-unit-cart
      - test-unit-orders
      - test-unit-payments
      - test-unit-admin-auditing
      - test-unit-promotions
      - test-unit-reviews-disputes-notifications
      - test-architecture
      - test-analyzers
      - test-integration
    runs-on: ubuntu-latest
    steps:
      - name: All stages passed
        run: echo "✅ Build, unit tests, architecture tests, analyzer tests, and integration tests all passed."

  # ┌──────────────────────────────────────────────────────────────────────────┐
  # │  STAGE 5 — DOCKER BUILD & PUSH (main / p1-main only)                      │
  # └──────────────────────────────────────────────────────────────────────────┘
  docker-build:
    name: "🐳 Docker Build & Push"
    needs: verify
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/p1-main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t marketnest:${{ github.sha }} .

      - name: Push to GHCR
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker tag marketnest:${{ github.sha }} ghcr.io/${{ github.repository }}:${{ github.sha }}
          docker tag marketnest:${{ github.sha }} ghcr.io/${{ github.repository }}:latest
          docker push ghcr.io/${{ github.repository }}:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}:latest
