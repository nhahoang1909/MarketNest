name: Build & Test & Verify

on:
  push:
    branches: [main, p1-main, develop]
  pull_request:
    branches: [main, p1-main]

env:
  DOTNET_VERSION: '10.x'
  CONFIGURATION: Release

# ──────────────────────────────────────────────────────────────────────────────
# JOBS
# ──────────────────────────────────────────────────────────────────────────────
jobs:

  # ┌──────────────────────────────────────────────────────────────────────────┐
  # │  STAGE 1 — RESTORE                                                        │
  # └──────────────────────────────────────────────────────────────────────────┘
  restore:
    name: "📦 Restore NuGet"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore solution
        run: dotnet restore

  # ┌──────────────────────────────────────────────────────────────────────────┐
  # │  STAGE 2 — BUILD (parallel per module group)                              │
  # │  Each job runs independently — a single module failure is clearly visible  │
  # └──────────────────────────────────────────────────────────────────────────┘

  build-base:
    name: "🔨 Build / Base"
    needs: restore
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - uses: actions/cache/restore@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: ${{ runner.os }}-nuget-
      - name: Restore Base packages
        run: |
          dotnet restore src/Base/MarketNest.Base.Common
          dotnet restore src/Base/MarketNest.Base.Domain
          dotnet restore src/Base/MarketNest.Base.Infrastructure
          dotnet restore src/Base/MarketNest.Base.Api
          dotnet restore src/Base/MarketNest.Base.Utility
      - name: Build Base.Common
        run: dotnet build src/Base/MarketNest.Base.Common --no-restore -c ${{ env.CONFIGURATION }}
      - name: Build Base.Domain
        run: dotnet build src/Base/MarketNest.Base.Domain --no-restore -c ${{ env.CONFIGURATION }}
      - name: Build Base.Infrastructure
        run: dotnet build src/Base/MarketNest.Base.Infrastructure --no-restore -c ${{ env.CONFIGURATION }}
      - name: Build Base.Api
        run: dotnet build src/Base/MarketNest.Base.Api --no-restore -c ${{ env.CONFIGURATION }}
      - name: Build Base.Utility
        run: dotnet build src/Base/MarketNest.Base.Utility --no-restore -c ${{ env.CONFIGURATION }}

  build-core:
    name: "🔨 Build / Core"
    needs: restore
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - uses: actions/cache/restore@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: ${{ runner.os }}-nuget-
      - name: Restore
        run: dotnet restore src/MarketNest.Core
      - name: Build Core
        run: dotnet build src/MarketNest.Core --no-restore -c ${{ env.CONFIGURATION }}

  build-identity:
    name: "🔨 Build / Identity"
    needs: restore
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - uses: actions/cache/restore@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: ${{ runner.os }}-nuget-
      - name: Restore
        run: dotnet restore src/MarketNest.Identity
      - name: Build Identity
        run: dotnet build src/MarketNest.Identity --no-restore -c ${{ env.CONFIGURATION }}

  build-catalog:
    name: "🔨 Build / Catalog"
    needs: restore
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - uses: actions/cache/restore@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: ${{ runner.os }}-nuget-
      - name: Restore
        run: dotnet restore src/MarketNest.Catalog
      - name: Build Catalog
        run: dotnet build src/MarketNest.Catalog --no-restore -c ${{ env.CONFIGURATION }}

  build-cart:
    name: "🔨 Build / Cart"
    needs: restore
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - uses: actions/cache/restore@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: ${{ runner.os }}-nuget-
      - name: Restore
        run: dotnet restore src/MarketNest.Cart
      - name: Build Cart
        run: dotnet build src/MarketNest.Cart --no-restore -c ${{ env.CONFIGURATION }}

  build-orders:
    name: "🔨 Build / Orders"
    needs: restore
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - uses: actions/cache/restore@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: ${{ runner.os }}-nuget-
      - name: Restore
        run: dotnet restore src/MarketNest.Orders
      - name: Build Orders
        run: dotnet build src/MarketNest.Orders --no-restore -c ${{ env.CONFIGURATION }}

  build-payments:
    name: "🔨 Build / Payments"
    needs: restore
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - uses: actions/cache/restore@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: ${{ runner.os }}-nuget-
      - name: Restore
        run: dotnet restore src/MarketNest.Payments
      - name: Build Payments
        run: dotnet build src/MarketNest.Payments --no-restore -c ${{ env.CONFIGURATION }}

  build-reviews-disputes:
    name: "🔨 Build / Reviews & Disputes"
    needs: restore
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - uses: actions/cache/restore@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: ${{ runner.os }}-nuget-
      - name: Restore
        run: |
          dotnet restore src/MarketNest.Reviews
          dotnet restore src/MarketNest.Disputes
      - name: Build Reviews
        run: dotnet build src/MarketNest.Reviews --no-restore -c ${{ env.CONFIGURATION }}
      - name: Build Disputes
        run: dotnet build src/MarketNest.Disputes --no-restore -c ${{ env.CONFIGURATION }}

  build-notifications:
    name: "🔨 Build / Notifications"
    needs: restore
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - uses: actions/cache/restore@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: ${{ runner.os }}-nuget-
      - name: Restore
        run: dotnet restore src/MarketNest.Notifications
      - name: Build Notifications
        run: dotnet build src/MarketNest.Notifications --no-restore -c ${{ env.CONFIGURATION }}

  build-admin:
    name: "🔨 Build / Admin"
    needs: restore
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - uses: actions/cache/restore@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
