      - name: Build Promotions
        run: dotnet build src/MarketNest.Promotions --no-restore -c ${{ env.CONFIGURATION }}

  build-analyzers:
    name: "🔨 Build / Analyzers"
    needs: restore
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - uses: actions/cache/restore@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: ${{ runner.os }}-nuget-
      - name: Restore
        run: dotnet restore src/MarketNest.Analyzers
      - name: Build Analyzers
        run: dotnet build src/MarketNest.Analyzers --no-restore -c ${{ env.CONFIGURATION }}

  # build-web is the final integration build — compiles the full host.
  # All module builds must pass before this job runs.
  build-web:
    name: "🔨 Build / Web Host (full solution)"
    needs:
      - build-base
      - build-core
      - build-identity
      - build-catalog
      - build-cart
      - build-orders
      - build-payments
      - build-reviews-disputes
      - build-notifications
      - build-admin
      - build-auditing
      - build-promotions
      - build-analyzers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - uses: actions/cache/restore@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: ${{ runner.os }}-nuget-
      - name: Restore
        run: dotnet restore src/MarketNest.Web
      - name: Build Web Host
        run: dotnet build src/MarketNest.Web --no-restore -c ${{ env.CONFIGURATION }}

  # ┌──────────────────────────────────────────────────────────────────────────┐
  # │  STAGE 3 — TEST (parallel per module / category)                          │
  # │  All test jobs depend on build-web (all modules compiled successfully).    │
  # │  Filters use FullyQualifiedName to isolate tests per module namespace.     │
  # └──────────────────────────────────────────────────────────────────────────┘

  test-unit-base-core:
    name: "🧪 Unit Tests / Base & Core"
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - uses: actions/cache/restore@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: ${{ runner.os }}-nuget-
      - name: Restore test project
        run: dotnet restore tests/MarketNest.UnitTests
      - name: Run tests
        run: |
          dotnet test tests/MarketNest.UnitTests \
            --no-restore \
            -c ${{ env.CONFIGURATION }} \
            --filter "FullyQualifiedName~MarketNest.Base|FullyQualifiedName~MarketNest.Core" \
            --logger "trx;LogFileName=unit-base-core.trx" \
            --results-directory ./test-results
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-unit-base-core
          path: ./test-results/*.trx

